name: get_sell_price_and_WXpush

on:
  schedule:
    - cron: '26 1 * * *'
  workflow_dispatch:
    branches:
      - main
permissions:
  contents: write
  
jobs:
  run_script:
    runs-on: ubuntu-latest
    environment: TOKEN   # 👈 关键：指定要使用的环境名称

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Python script
      env:
        pushplus_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      run: python get_sell_price_and_WXpush.py
  
    - name: Commit and push changes
      run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add gitee_stock_result.log
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update live.txt"
          git push
